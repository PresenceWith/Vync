appId: com.vync.app
productName: Vync

directories:
  output: dist/packages
  buildResources: build

mac:
  category: public.app-category.productivity
  target: dmg

dmg:
  title: Vync
  iconSize: 80
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

fileAssociations:
  - ext: vync
    name: Vync Canvas
    role: Editor

files:
  - dist/electron/**/*
  - dist/apps/web/**/*
  - node_modules/**/*
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.{md,map,ts}"
  - "!**/node_modules/.cache/**"

extraMetadata:
  main: dist/electron/main.js
